# Nginx reverse proxy for the Strapi backend droplet.
# Copy to /etc/nginx/sites-available/bayansignage-strapi, symlink into
# sites-enabled, then run certbot --nginx to add HTTPS (see DEPLOYMENT.md).

server {
    listen 80;
    listen [::]:80;
    server_name api.bayansignage.com;

    # Strapi media uploads can be sizeable -- raise the default 1M limit.
    client_max_body_size 50M;

    location / {
        proxy_pass http://127.0.0.1:1337;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
