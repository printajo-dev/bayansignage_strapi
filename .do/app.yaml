# DigitalOcean App Platform spec for the Strapi backend.
#
# Import: App Platform dashboard -> Create App -> pick this GitHub repo ->
# it will detect this file, or paste it in manually. `deploy_on_push: true`
# is what makes `git push` to `main` auto-deploy -- no GitHub Action needed.
#
# After the first deploy, go to Settings -> App-Level Environment Variables
# (or the `strapi` component's env vars) and fill in every value marked
# SECRET below with a real value. Generate the Strapi secrets with:
#   node -e "console.log(require('crypto').randomBytes(16).toString('base64'))"
# (run it 6 times for APP_KEYS x2, API_TOKEN_SALT, ADMIN_JWT_SECRET,
# TRANSFER_TOKEN_SALT, JWT_SECRET, ENCRYPTION_KEY.)

name: bayansignage-strapi
region: nyc
services:
  - name: strapi
    github:
      repo: printajo-dev/bayansignage_strapi
      branch: main
      deploy_on_push: true
    source_dir: /
    environment_slug: node-js
    instance_size_slug: basic-xxs
    instance_count: 1
    http_port: 1337
    build_command: npm run build
    run_command: npm run start
    envs:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: "0.0.0.0"
      - key: STRAPI_TELEMETRY_DISABLED
        value: "true"

      # Frontend origin(s) allowed to call this API. Update after the
      # frontend is deployed (comma-separated, no trailing slash).
      - key: CORS_ALLOWED_ORIGINS
        value: "https://bayansignage.com,https://www.bayansignage.com"

      # Database -- bound to the managed Postgres below.
      - key: DATABASE_CLIENT
        value: postgres
      - key: DATABASE_URL
        value: ${db.DATABASE_URL}
        type: SECRET
      - key: DATABASE_SSL
        value: "true"

      # Strapi core secrets -- fill in real generated values, see note above.
      - key: APP_KEYS
        value: REPLACE_ME
        type: SECRET
      - key: API_TOKEN_SALT
        value: REPLACE_ME
        type: SECRET
      - key: ADMIN_JWT_SECRET
        value: REPLACE_ME
        type: SECRET
      - key: TRANSFER_TOKEN_SALT
        value: REPLACE_ME
        type: SECRET
      - key: JWT_SECRET
        value: REPLACE_ME
        type: SECRET
      - key: ENCRYPTION_KEY
        value: REPLACE_ME
        type: SECRET

      # Optional: lead email notification (Brevo SMTP). Leave blank to skip.
      - key: BREVO_SMTP_HOST
        value: smtp-relay.brevo.com
      - key: BREVO_SMTP_PORT
        value: "587"
      - key: BREVO_SMTP_USER
        value: ""
        type: SECRET
      - key: BREVO_SMTP_PASS
        value: ""
        type: SECRET
      - key: LEAD_NOTIFY_EMAIL
        value: info@bayansignage.com
      - key: LEAD_NOTIFY_FROM
        value: '"Bayan Signage Website" <no-reply@bayansignage.com>'

      # Optional: Perfex CRM sync. Leave blank to skip.
      - key: PERFEX_API_URL
        value: ""
      - key: PERFEX_API_TOKEN
        value: ""
        type: SECRET

# `production: false` provisions the cheapest dev-tier Postgres (shared,
# single node) -- fine to start. Switch to `true` for a production-grade
# managed cluster with backups/HA once the site has real traffic.
databases:
  - name: db
    engine: PG
    production: false
